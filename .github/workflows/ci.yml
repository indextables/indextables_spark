name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test-macos:
    name: Build & Test (macOS ARM64)
    runs-on: [self-hosted, macOS, ARM64]
    environment: test-runners

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # setup-java only adds the JDK to PATH; it does not restore Homebrew.
      # Ensure brew/mvn/protoc are discoverable for the run: steps below,
      # even when the runner's service environment omits Homebrew from PATH.
      - name: Ensure Homebrew on PATH
        run: |
          for prefix in /opt/homebrew /usr/local; do
            if [[ -x "$prefix/bin/brew" ]]; then
              echo "$prefix/bin" >> "$GITHUB_PATH"
              echo "$prefix/sbin" >> "$GITHUB_PATH"
            fi
          done

      - name: Setup dependencies
        run: ./scripts/setup.sh

      - name: Build
        run: make compile

      - name: Test
        id: test-macos
        run: make test

      - name: Upload test logs
        if: failure() && steps.test-macos.outputs.log_dir != ''
        uses: actions/upload-artifact@v7
        with:
          name: macos-test-logs
          path: ${{ steps.test-macos.outputs.log_dir }}/
          if-no-files-found: warn
          retention-days: 7

  # Linux X64 CI is disabled pending a host-OS upgrade on the self-hosted
