name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test-macos:
    name: Build & Test (macOS ARM64)
    runs-on: [self-hosted, macOS, ARM64]
    environment: test-runners
    env:
      JAVA_HOME: /opt/homebrew/opt/openjdk@11
      PATH: /opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup dependencies
        run: ./scripts/setup.sh

      - name: Build
        run: make compile

      - name: Test
        id: test-macos
        run: make test

      - name: Upload test logs
        if: failure() && steps.test-macos.outputs.log_dir != ''
        uses: actions/upload-artifact@v7
        with:
          name: macos-test-logs
          path: ${{ steps.test-macos.outputs.log_dir }}/
          if-no-files-found: warn
          retention-days: 7

  # Linux X64 CI is disabled pending a host-OS upgrade on the self-hosted
