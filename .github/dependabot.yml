version: 2
updates:
  - package-ecosystem: maven
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      spark-ecosystem:
        patterns:
          - "org.apache.spark:*"
          - "io.delta:*"
          - "org.apache.iceberg:*"
      test-dependencies:
        dependency-type: development
    labels:
      - "type: chore"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - "type: chore"
